<style>
    @keyframes pulse-red {
      0% { box-shadow: 0 0 0 0 rgba(220, 38, 38, 0.4); }
      70% { box-shadow: 0 0 0 20px rgba(220, 38, 38, 0); }
      100% { box-shadow: 0 0 0 0 rgba(220, 38, 38, 0); }
    }
    .animate-pulse-alert {
      animation: pulse-red 2s infinite;
    }
    .emergency-gradient {
      background: radial-gradient(circle at center, #bb0112 0%, #93000b 100%);
    }
    .material-symbols-outlined {
      font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 48;
    }
  </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>

<body class="bg-background font-body-md overflow-hidden">
<!-- Full-Screen P1 Alert Modal -->
<div class="fixed inset-0 z-[100] emergency-gradient flex flex-col items-center justify-center p-margin-mobile md:p-container-padding text-white overflow-hidden" id="p1-alert-overlay">
<!-- Pulse Effect Background Decor -->
<div class="absolute inset-0 flex items-center justify-center pointer-events-none">
<div class="w-96 h-96 bg-white/5 rounded-full animate-ping opacity-20"></div>
</div>
<!-- Main Content Container -->
<div class="relative z-10 w-full max-w-2xl flex flex-col items-center text-center">
<!-- Top Alert Header -->
<div class="mb-8 flex flex-col items-center">
<div class="w-20 h-20 bg-white rounded-full flex items-center justify-center mb-4 animate-pulse-alert">
<span class="material-symbols-outlined text-secondary text-5xl" style="font-variation-settings: 'FILL' 1;">warning</span>
</div>
<h1 class="font-display-lg text-display-lg uppercase tracking-widest leading-none">NEW P1 EMERGENCY</h1>
</div>
<!-- Patient Info Card -->
<div class="w-full bg-white/10 backdrop-blur-md rounded-xl p-8 border border-white/20 mb-10">
<div class="flex flex-col items-center mb-6">
<p class="font-label-md text-label-md text-white/70 uppercase tracking-tighter mb-1">Patient Name</p>
<h2 class="font-headline-lg text-headline-lg-mobile md:text-headline-lg">Zainab Ahmed</h2>
</div>
<div class="grid grid-cols-1 md:grid-cols-2 gap-6 text-left">
<div class="bg-white/5 p-4 rounded-lg">
<div class="flex items-center gap-2 mb-2 text-white/70">
<span class="material-symbols-outlined text-sm">medical_services</span>
<p class="font-label-md text-label-md uppercase">Symptom</p>
</div>
<p class="font-body-lg text-body-lg font-medium leading-snug">Severe chest pain radiating to left arm and shortness of breath.</p>
</div>
<div class="bg-white/5 p-4 rounded-lg flex flex-col justify-center border-l-4 border-white/40">
<div class="flex items-center gap-2 mb-1 text-white/70">
<span class="material-symbols-outlined text-sm">schedule</span>
<p class="font-label-md text-label-md uppercase">Elapsed</p>
</div>
<p class="font-headline-md text-headline-md">4 minutes ago</p>
</div>
</div>
</div>
<!-- Action Buttons -->
<div class="flex flex-col md:flex-row gap-4 w-full">
<button class="flex-1 h-touch-target-min min-h-[80px] bg-white text-secondary rounded-full flex items-center justify-center gap-3 active:scale-95 transition-transform hover:bg-surface-container-lowest shadow-2xl">
<span class="material-symbols-outlined text-3xl" style="font-variation-settings: 'FILL' 1;">call</span>
<span class="font-headline-md text-headline-md">Call Patient</span>
</button>
<button class="flex-1 h-touch-target-min min-h-[80px] bg-white/20 text-white border-2 border-white/40 rounded-full flex items-center justify-center gap-3 active:scale-95 transition-transform hover:bg-white/30 backdrop-blur-sm">
<span class="material-symbols-outlined text-3xl">task_alt</span>
<span class="font-headline-md text-headline-md">I'm handling this</span>
</button>
</div>
<!-- Footnote -->
<footer class="mt-12 opacity-80 flex items-center gap-2">
<span class="material-symbols-outlined text-sm">info</span>
<p class="font-label-md text-label-md italic">Dismiss only after taking action</p>
</footer>
</div>
<!-- Corner Branding Decor -->
<div class="absolute bottom-6 left-6 opacity-30 select-none">
<p class="font-headline-md text-white/50">Clinic Central</p>
</div>
<div class="absolute top-6 right-6 opacity-30">
<span class="material-symbols-outlined text-white text-4xl">local_hospital</span>
</div>
</div>
<!-- Background Content (Simulated Main Dashboard) - Visible if modal is closed -->
<main class="w-full h-screen p-container-padding flex flex-col gap-gutter filter blur-lg pointer-events-none">
<!-- TopAppBar Mockup -->
<header class="flex justify-between items-center h-touch-target-min w-full">
<span class="font-headline-md text-primary">Clinic Central</span>
<div class="w-10 h-10 bg-outline-variant rounded-full"></div>
</header>
<div class="grid grid-cols-12 gap-gutter flex-1">
<div class="col-span-8 bg-surface-container rounded-xl"></div>
<div class="col-span-4 bg-surface-container-high rounded-xl"></div>
</div>
</main>
<script>
    // Micro-interaction: Periodic "Alert" audio visualizer or vibration mimic
    // For this prototype, we'll just add a slight intensity pulse to the background color
    let intensity = 0;
    const overlay = document.getElementById('p1-alert-overlay');
    
    function animateBackground() {
      intensity = (Math.sin(Date.now() / 500) * 10) + 90;
      overlay.style.background = `radial-gradient(circle at center, #bb0112 ${intensity-20}%, #93000b 110%)`;
      requestAnimationFrame(animateBackground);
    }
    
    // Start animation if browser allows
    animateBackground();

    // Interaction handling
    document.querySelectorAll('button').forEach(btn => {
      btn.addEventListener('click', () => {
        // In a real app, this would trigger specific API calls
        // We'll just show a brief feedback before 'handling'
        btn.innerHTML = 'Updating status...';
        setTimeout(() => {
          overlay.classList.add('translate-y-full');
          overlay.style.transition = 'transform 0.5s cubic-bezier(0.4, 0, 0.2, 1)';
        }, 800);
      });
    });
  </script>
